version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: solicitudes_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: solicitudes_db
      MYSQL_USER: solicitudes_user
      MYSQL_PASSWORD: solicitudes_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - solicitudes_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    container_name: solicitudes_rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks:
      - solicitudes_network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      timeout: 30s
      retries: 5

  api:
    build:
      context: .
      target: api
    container_name: solicitudes_api
    restart: always
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/solicitudes_db
      SPRING_DATASOURCE_USERNAME: solicitudes_user
      SPRING_DATASOURCE_PASSWORD: solicitudes_pass
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - solicitudes_network

  worker:
    build:
      context: .
      target: worker
    restart: always
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/solicitudes_db
      SPRING_DATASOURCE_USERNAME: solicitudes_user
      SPRING_DATASOURCE_PASSWORD: solicitudes_pass
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
      SIMULATION_MODE: standard
    deploy:
      replicas: 5
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - solicitudes_network

volumes:
  mysql_data:
    driver: local

networks:
  solicitudes_network:
    driver: bridge
