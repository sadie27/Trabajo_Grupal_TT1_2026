name: Validate Javadoc

on:
  push:
    branches:
      - early

jobs:
  build-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Generate Javadoc
        run: mvn -B javadoc:javadoc
