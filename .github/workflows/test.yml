name: Test and Promote

on:
  push:
    branches:
      - main
      - implementacion_dominio

permissions:
  contents: write

jobs:
  test-and-promote:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: solicitudes_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21  
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Wait for MySQL to be ready
        run: |
          until mysqladmin ping -h 127.0.0.1 -P 3306 --silent; do
            echo 'Waiting for MySQL to be available...'
            sleep 2
          done
          echo 'MySQL is ready!'

      - name: Run tests
        id: tests
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/solicitudes_db
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: root
        run: mvn test

      - name: Update early branch
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin
          git checkout early 2>/dev/null || git checkout -b early
          if ! git merge --ff-only origin/main; then
            echo "### ❌ La rama early tiene commits que no están en main. Resuélvelo manualmente." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          git push origin early

      - name: Summary on success
        if: success()
        run: echo "###  Tests superados. La rama **early** ha sido actualizada." >> $GITHUB_STEP_SUMMARY

      - name: Summary on failure
        if: failure()
        run: echo "###  Tests fallidos. La rama **early** NO ha sido modificada." >> $GITHUB_STEP_SUMMARY